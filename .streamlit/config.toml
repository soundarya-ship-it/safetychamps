[server]
headless = true
port = 8501
# Serve files from the ./static folder at /app/static/* — used for PWA
# manifest, service worker, icons, and the offline emergency.html companion.
enableStaticServing = true

[theme]
primaryColor = "#dc2626"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f8fafc"
textColor = "#111827"
font = "sans serif"

[browser]
gatherUsageStats = false
